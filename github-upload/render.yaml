services:
  - type: web
    name: world-cup-prediction-tracker
    runtime: python
    plan: free
    rootDir: outputs
    buildCommand: ""
    startCommand: python collaborative_server.py
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: DATA_DIR
        value: /opt/render/project/src/outputs
