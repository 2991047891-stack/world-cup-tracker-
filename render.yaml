services:
  - type: web
    name: world-cup-prediction-tracker
    runtime: python
    plan: starter
    buildCommand: ""
    startCommand: "python collaborative_server.py"
    envVars:
      - key: DATA_DIR
        value: /var/data
    disk:
      name: prediction-data
      mountPath: /var/data
      sizeGB: 1
